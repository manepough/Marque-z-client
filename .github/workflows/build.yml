name: Build ManesClient APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner openjdk-17-jdk wget unzip cmake curl jq

          APKTOOL_VER=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep tag_name | cut -d '"' -f4)
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/${APKTOOL_VER}/apktool_${APKTOOL_VER#v}.jar" -O apktool.jar
          echo "#!/bin/bash" | sudo tee /usr/local/bin/apktool > /dev/null
          echo "java -jar $(pwd)/apktool.jar \"\$@\"" | sudo tee -a /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool

      - name: Set up Android NDK r26
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Download base Minecraft APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/mc-base" > release_info.json
          ASSET_ID=$(cat release_info.json | jq -r '.assets[0].id')
          ASSET_NAME=$(cat release_info.json | jq -r '.assets[0].name')
          echo "Downloading: $ASSET_NAME"
          curl -L -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}" -o base_mc.apk
          echo "Downloaded: $(du -sh base_mc.apk | cut -f1)"

      - name: Setup hooks and patch files
        run: |
          JNI="app/src/main/jni"

          # And64InlineHook
          git clone https://github.com/Rprop/And64InlineHook --depth=1 "$JNI/And64InlineHook"

          # ImGui — clone into imgui/ flat (NO subfolders with duplicates)
          git clone https://github.com/ocornut/imgui --depth=1 "$JNI/imgui"

          # Delete old MC-type-dependent files (replaced by modules.h)
          rm -f "$JNI/scaffold.h" "$JNI/autoarmor.h" "$JNI/antiafk.h"

          # Remove their includes from menu.h
          sed -i '/#include.*scaffold\.h/d'  "$JNI/menu.h"
          sed -i '/#include.*autoarmor\.h/d' "$JNI/menu.h"
          sed -i '/#include.*antiafk\.h/d'   "$JNI/menu.h"
          sed -i '/#include.*Images/d'       "$JNI/menu.h"
          sed -i '/#include.*YT\.h/d'           "$JNI/menu.h"

          # Dobby shim
          printf '#pragma once\n' > "$JNI/dobby_compat.h"
          printf '#include "And64InlineHook/And64InlineHook.hpp"\n' >> "$JNI/dobby_compat.h"
          printf 'static inline int DobbyHook(void* a,void* b,void** c){return A64HookFunction(a,b,c)?0:-1;}\n' >> "$JNI/dobby_compat.h"
          printf 'static inline int DobbyDestroy(void* a){return 0;}\n' >> "$JNI/dobby_compat.h"
          printf 'static inline void* DobbySymbolResolver(const char* a,const char* b){return nullptr;}\n' >> "$JNI/dobby_compat.h"

          # Add OBFUSCATE fallback define to all our headers
          for hdr in crosshair.h theme.h floatingbutton.h stickfight.h modules.h render_hook.h touch_hook.h; do
            f="$JNI/$hdr"
            if [ -f "$f" ]; then
              grep -q 'ifndef OBFUSCATE' "$f" || sed -i '1s/^/#ifndef OBFUSCATE\n#define OBFUSCATE(x) (x)\n#endif\n/' "$f"
            fi
          done

          # Patch dobby.h includes
          find "$JNI" -name "*.h" -o -name "*.cpp" | xargs grep -l "dobby.h" 2>/dev/null | while read f; do
            sed -i 's|#include.*dobby\.h.*|#include "dobby_compat.h"|g' "$f"
          done


          # Inject missing variable declarations into menu.h
          # These were from the original project headers
          VARS_INJECT="$JNI/vars_inject.h"
          printf '#pragma once\n' > "$VARS_INJECT"
          printf '// Missing variable declarations restored\n' >> "$VARS_INJECT"
          printf 'inline int  auraType            = 0;\n' >> "$VARS_INJECT"
          printf 'inline int  maxKillTick         = 5;\n' >> "$VARS_INJECT"
          printf 'inline int  currentKillTick     = 0;\n' >> "$VARS_INJECT"
          printf 'inline bool canKillAuraDamage   = false;\n' >> "$VARS_INJECT"
          printf 'inline int  maxMobAuraTick      = 5;\n' >> "$VARS_INJECT"
          printf 'inline int  currentMobTick      = 0;\n' >> "$VARS_INJECT"
          printf 'inline bool canMobAuraDamage    = false;\n' >> "$VARS_INJECT"
          printf 'inline bool emulateNativeAttack = false;\n' >> "$VARS_INJECT"
          printf 'inline bool rotations           = true;\n' >> "$VARS_INJECT"
          printf 'inline bool targetLock          = false;\n' >> "$VARS_INJECT"
          printf 'inline bool autoClicker         = false;\n' >> "$VARS_INJECT"
          printf 'inline int  autoClickDelay      = 5;\n' >> "$VARS_INJECT"
          printf 'inline int  currentAutoClickTick= 0;\n' >> "$VARS_INJECT"
          printf 'inline bool canClick            = false;\n' >> "$VARS_INJECT"
          printf 'inline int  maxAutoClickTick    = 5;\n' >> "$VARS_INJECT"
          printf 'inline bool panic               = false;\n' >> "$VARS_INJECT"
          printf 'static const unsigned char YoutubeIcon[]      = {0};\n' >> "$VARS_INJECT"
          printf 'static const unsigned char TelegramIcon[]     = {0};\n' >> "$VARS_INJECT"
          printf 'static const unsigned char DiscordIcon[]      = {0};\n' >> "$VARS_INJECT"
          printf 'static const unsigned char AmethystShardIcon[]= {0};\n' >> "$VARS_INJECT"
          printf '#include <GLES3/gl3.h>\n' >> "$VARS_INJECT"
          printf 'static inline unsigned int CreateTextureFromMemoryPNG(const unsigned char* d, int s){return 0;}\n' >> "$VARS_INJECT"
          printf 'inline bool  readMe          = false;\n' >> "$VARS_INJECT"
          printf 'inline float screenWidth     = 1080.0f;\n' >> "$VARS_INJECT"
          printf 'inline float screenHeight    = 1920.0f;\n' >> "$VARS_INJECT"
          printf 'inline float calcResX        = 1.0f;\n' >> "$VARS_INJECT"
          printf 'inline float scaleGlobal     = 1.0f;\n' >> "$VARS_INJECT"
          printf 'inline int   pageId          = 0;\n' >> "$VARS_INJECT"
          printf 'inline void* g_window        = nullptr;\n' >> "$VARS_INJECT"
          printf 'static inline float calculateResolutionScale(float w,float h,float bw,float bh){return w/bw;}\n' >> "$VARS_INJECT"
          printf 'static inline void BackGroundDots(int,float,float,float){}\n' >> "$VARS_INJECT"
          printf 'static inline void SectionHeader(const char* s){ImGui::TextColored(ImVec4(0,0.82f,0.95f,1),s);ImGui::Separator();}\n' >> "$VARS_INJECT"
          printf 'static inline void DrawSeparatorToWindowEdge(float,float){}\n' >> "$VARS_INJECT"
          printf 'static inline void RenderESP(ImDrawList*,float*,float,float*){}\n' >> "$VARS_INJECT"
          printf 'static inline void RenderOreESP(ImDrawList*,float*,float,float*){}\n' >> "$VARS_INJECT"
          printf 'static inline void RenderDeathPosition(ImDrawList*,float*,float,float*){}\n' >> "$VARS_INJECT"
          printf 'static inline void RenderHudExtras(float,float){}\n' >> "$VARS_INJECT"
          # ── Movement variables ──────────────────────────────────────────
          printf 'inline float waterSpeedValue=1.0f,lavaSpeedValue=1.0f;\n' >> "$VARS_INJECT"
          printf 'inline bool alwaysSprinting=false,noSlowDown=false,offSlowdownTrigger=false;\n' >> "$VARS_INJECT"
          printf 'inline bool noJumpDelay=false,isLANGame=false,fastFall=false;\n' >> "$VARS_INJECT"
          printf 'inline bool step=false,ladderFly=false,noclip=false;\n' >> "$VARS_INJECT"
          printf 'inline bool creativeFly=false,forceCreativeFly=false,offWaterTrigger=false;\n' >> "$VARS_INJECT"
          printf 'inline float jumpValue=0.42f,gravityValue=0.08f;\n' >> "$VARS_INJECT"
          printf 'inline bool antiVoid=false,noFall=false,antiKB=false;\n' >> "$VARS_INJECT"
          printf 'inline float flySpeed=1.0f,speedValue=1.0f;\n' >> "$VARS_INJECT"
          printf 'inline bool fly=false,bhop=false,tpHack=false;\n' >> "$VARS_INJECT"
          # ── Combat variables ────────────────────────────────────────────
          printf 'inline bool mobAura=false,autoSword=false,triggerBot=false;\n' >> "$VARS_INJECT"
          printf 'inline bool criticals=false,antiCrit=false,aimAssist=false;\n' >> "$VARS_INJECT"
          printf 'inline float aimAssistStrength=1.0f,aimFov=90.0f;\n' >> "$VARS_INJECT"
          printf 'inline int maxMobAuraTick=5,currentMobTick=0;\n' >> "$VARS_INJECT"
          printf 'inline bool canMobAuraDamage=false;\n' >> "$VARS_INJECT"
          # ── Visual variables ────────────────────────────────────────────
          printf 'inline bool fullBright=false,noFog=false,xrayDefault=false;\n' >> "$VARS_INJECT"
          printf 'inline bool noRender=false,noParticles=false,freeCam=false;\n' >> "$VARS_INJECT"
          printf 'inline float fovValue=70.0f,brightness=1.0f;\n' >> "$VARS_INJECT"
          printf 'inline bool deathPosition=false,chestEsp=false;\n' >> "$VARS_INJECT"
          printf 'inline bool espBox=false,espLine=false,espNametag=false;\n' >> "$VARS_INJECT"
          printf 'inline bool espHealth=false,espPlatform=false,espDistance=false;\n' >> "$VARS_INJECT"
          # ── Player/inventory variables ──────────────────────────────────
          printf 'inline bool instaBreak=false,nuker=false,chestStealer=false;\n' >> "$VARS_INJECT"
          printf 'inline bool autoEat=false,autoFish=false,antiHunger=false;\n' >> "$VARS_INJECT"
          printf 'inline float reach=3.0f,blockReach=4.5f;\n' >> "$VARS_INJECT"
          # ── World/LAN variables ─────────────────────────────────────────
          printf 'inline bool lanOpen=false,antiCheat=false;\n' >> "$VARS_INJECT"
          printf 'inline int  lanPort=19132;\n' >> "$VARS_INJECT"
          # ── UI/theme variables ──────────────────────────────────────────
          printf 'inline bool showFPS=false,showPing=false,showCoords=true;\n' >> "$VARS_INJECT"
          printf 'inline bool arrayList=false,watermark=true;\n' >> "$VARS_INJECT"
          printf 'inline float endV=0.0f;\n' >> "$VARS_INJECT"

          printf 'inline float currentFov      = 70.0f;\n' >> "$VARS_INJECT"
          printf 'inline float currentViewMatrix[16] = {};\n' >> "$VARS_INJECT"
          printf 'inline float CameraPos[3]    = {};\n' >> "$VARS_INJECT"
          printf 'inline void* RenderPlayer    = nullptr;\n' >> "$VARS_INJECT"

          # Also remove the icon-loading lines from menu.h that reference missing data
          sed -i '/YoutubeIcon\|TelegramIcon\|DiscordIcon\|AmethystShardIcon\|CreateTextureFromMemoryPNG\|youtube_icon\|telegram_icon\|discord_icon\|amethyst_shard_icon/d' "$JNI/menu.h"


          # Include it at top of menu.h
          grep -q "vars_inject" "$JNI/menu.h" || sed -i "1s/^/#include \"vars_inject.h\"\n/" "$JNI/menu.h"

          # Patch menu.h menuOpen references
          sed -i 's/if (menuOpen)/if (FloatingButton::menuOpen)/g'   "$JNI/menu.h"
          sed -i 's/if (!menuOpen)/if (!FloatingButton::menuOpen)/g' "$JNI/menu.h"

          # Build Android.mk from scratch
          ORIG_SRC=$(grep "^LOCAL_SRC_FILES" "$JNI/Android.mk" | grep -v "dobby\|libraries" | head -1 | cut -d= -f2- | xargs)
          ORIG_FLAGS=$(grep "LOCAL_CPPFLAGS" "$JNI/Android.mk" | head -1 | cut -d= -f2- | xargs)
          ORIG_LIBS=$(grep  "LOCAL_LDLIBS"   "$JNI/Android.mk" | head -1 | cut -d= -f2- | xargs)
          ORIG_MOD=$(grep   "LOCAL_MODULE"   "$JNI/Android.mk" | grep -v "dobby" | head -1 | cut -d= -f2- | xargs)

          printf 'LOCAL_PATH := $(call my-dir)\n\n' > "$JNI/Android.mk"
          printf 'include $(CLEAR_VARS)\n' >> "$JNI/Android.mk"
          printf 'LOCAL_MODULE    := %s\n' "$ORIG_MOD" >> "$JNI/Android.mk"
          printf 'LOCAL_SRC_FILES := main.cpp %s \\\n' "$ORIG_SRC" >> "$JNI/Android.mk"
          printf '    And64InlineHook/And64InlineHook.cpp \\\n' >> "$JNI/Android.mk"
          printf '    imgui/imgui.cpp \\\n' >> "$JNI/Android.mk"
          printf '    imgui/imgui_draw.cpp \\\n' >> "$JNI/Android.mk"
          printf '    imgui/imgui_widgets.cpp \\\n' >> "$JNI/Android.mk"
          printf '    imgui/imgui_tables.cpp \\\n' >> "$JNI/Android.mk"
          printf '    imgui/backends/imgui_impl_opengl3.cpp\n' >> "$JNI/Android.mk"
          printf 'LOCAL_C_INCLUDES := $(LOCAL_PATH)/imgui $(LOCAL_PATH)\n' >> "$JNI/Android.mk"
          printf 'LOCAL_CPPFLAGS  := %s -std=c++17\n' "$ORIG_FLAGS" >> "$JNI/Android.mk"
          printf 'LOCAL_LDLIBS    := %s -llog -landroid -lEGL -lGLESv3 -ldl\n' "$ORIG_LIBS" >> "$JNI/Android.mk"
          printf 'include $(BUILD_SHARED_LIBRARY)\n' >> "$JNI/Android.mk"

          echo "=== Android.mk ==="
          cat "$JNI/Android.mk"

      - name: Compile C++ to so
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd app/src/main/jni
          $NDK/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI="arm64-v8a" \
            -j$(nproc)
          ls -lh libs/arm64-v8a/

      - name: Inject so into APK
        run: |
          apktool d base_mc.apk -o mc_decoded --no-res -f
          mkdir -p mc_decoded/lib/arm64-v8a
          cp app/src/main/jni/libs/arm64-v8a/libManesClient.so mc_decoded/lib/arm64-v8a/
          apktool b mc_decoded -o ManesClient_unsigned.apk
          echo "Rebuilt: $(du -sh ManesClient_unsigned.apk | cut -f1)"

      - name: Sign APK
        run: |
          keytool -genkeypair -v -keystore manes.keystore -alias manes \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ManesClient,O=ManesClient,C=PH" \
            -storepass manespass -keypass manespass 2>/dev/null
          zipalign -v 4 ManesClient_unsigned.apk ManesClient_aligned.apk
          apksigner sign --ks manes.keystore --ks-key-alias manes \
            --ks-pass pass:manespass --key-pass pass:manespass \
            --out ManesClient_v2.apk ManesClient_aligned.apk
          echo "Done: $(du -sh ManesClient_v2.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ManesClient-v2.0-MC26.20
          path: ManesClient_v2.apk
          retention-days: 30
