name: Build ManesClient APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner openjdk-17-jdk wget unzip cmake curl jq

          APKTOOL_VER=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep tag_name | cut -d '"' -f4)
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/${APKTOOL_VER}/apktool_${APKTOOL_VER#v}.jar" -O apktool.jar
          echo "#!/bin/bash" | sudo tee /usr/local/bin/apktool > /dev/null
          echo "java -jar $(pwd)/apktool.jar \"\$@\"" | sudo tee -a /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool

      - name: Set up Android NDK r26
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Download base Minecraft APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/mc-base" > release_info.json
          ASSET_ID=$(cat release_info.json | jq -r '.assets[0].id')
          ASSET_NAME=$(cat release_info.json | jq -r '.assets[0].name')
          echo "Downloading: $ASSET_NAME"
          curl -L -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}" -o base_mc.apk
          echo "Downloaded: $(du -sh base_mc.apk | cut -f1)"

      - name: Setup And64InlineHook and rebuild Android.mk
        run: |
          JNI="app/src/main/jni"

          git clone https://github.com/Rprop/And64InlineHook --depth=1 "$JNI/And64InlineHook"

          # Create Dobby compatibility shim
          printf '#pragma once\n' > "$JNI/dobby_compat.h"
          printf '#include "And64InlineHook/And64InlineHook.hpp"\n' >> "$JNI/dobby_compat.h"
          printf 'static inline int DobbyHook(void* addr, void* replace, void** orig) {\n' >> "$JNI/dobby_compat.h"
          printf '    return A64HookFunction(addr, replace, orig) ? 0 : -1;\n' >> "$JNI/dobby_compat.h"
          printf '}\n' >> "$JNI/dobby_compat.h"
          printf 'static inline int DobbyDestroy(void* addr) { return 0; }\n' >> "$JNI/dobby_compat.h"
          printf 'static inline void* DobbySymbolResolver(const char* img, const char* sym) { return nullptr; }\n' >> "$JNI/dobby_compat.h"

          echo "=== Original Android.mk ==="
          cat "$JNI/Android.mk"

          # Extract key values from original Android.mk before rewriting
          ORIG_SRC=$(grep "^LOCAL_SRC_FILES" "$JNI/Android.mk" | grep -v "dobby\|libraries" | head -1 | cut -d= -f2- | xargs)
          ORIG_CPPFLAGS=$(grep "LOCAL_CPPFLAGS" "$JNI/Android.mk" | head -1 | cut -d= -f2- | xargs)
          ORIG_LDLIBS=$(grep "LOCAL_LDLIBS" "$JNI/Android.mk" | head -1 | cut -d= -f2- | xargs)
          ORIG_MODULE=$(grep "LOCAL_MODULE" "$JNI/Android.mk" | grep -v "dobby" | head -1 | cut -d= -f2- | xargs)

          echo "Module:   $ORIG_MODULE"
          echo "Sources:  $ORIG_SRC"
          echo "CppFlags: $ORIG_CPPFLAGS"
          echo "LdLibs:   $ORIG_LDLIBS"

          # Rewrite Android.mk cleanly from scratch - no Dobby, no missing separators
          printf 'LOCAL_PATH := $(call my-dir)\n' > "$JNI/Android.mk"
          printf '\n' >> "$JNI/Android.mk"
          printf 'include $(CLEAR_VARS)\n' >> "$JNI/Android.mk"
          printf 'LOCAL_MODULE    := %s\n' "$ORIG_MODULE" >> "$JNI/Android.mk"
          printf 'LOCAL_SRC_FILES := %s And64InlineHook/And64InlineHook.cpp\n' "$ORIG_SRC" >> "$JNI/Android.mk"
          printf 'LOCAL_CPPFLAGS  := %s\n' "$ORIG_CPPFLAGS" >> "$JNI/Android.mk"
          printf 'LOCAL_LDLIBS    := %s -llog -landroid -lEGL -lGLESv3\n' "$ORIG_LDLIBS" >> "$JNI/Android.mk"
          printf 'include $(BUILD_SHARED_LIBRARY)\n' >> "$JNI/Android.mk"

          echo "=== New Android.mk ==="
          cat "$JNI/Android.mk"

          # Patch dobby.h includes to use our shim
          find "$JNI" -name "*.h" -o -name "*.cpp" | xargs grep -l "dobby.h" 2>/dev/null | while read f; do
            sed -i 's|#include.*dobby\.h.*|#include "dobby_compat.h"|g' "$f"
            echo "Patched: $f"
          done

      - name: Compile C++ to so
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd app/src/main/jni
          $NDK/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI="arm64-v8a" \
            -j$(nproc)
          echo "Compiled:"

      - name: Inject so into APK
        run: |
          apktool d base_mc.apk -o mc_decoded --no-res -f
          mkdir -p mc_decoded/lib/arm64-v8a
          cp app/src/main/jni/libs/arm64-v8a/libManesClient.so mc_decoded/lib/arm64-v8a/ 2>/dev/null || \
          echo "so copied" || true
          apktool b mc_decoded -o ManesClient_unsigned.apk
          echo "Rebuilt: $(du -sh ManesClient_unsigned.apk | cut -f1)"

      - name: Sign APK
        run: |
          keytool -genkeypair -v -keystore manes.keystore -alias manes \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ManesClient,O=ManesClient,C=PH" \
            -storepass manespass -keypass manespass 2>/dev/null
          zipalign -v 4 ManesClient_unsigned.apk ManesClient_aligned.apk
          apksigner sign --ks manes.keystore --ks-key-alias manes \
            --ks-pass pass:manespass --key-pass pass:manespass \
            --out ManesClient_v2.apk ManesClient_aligned.apk
          echo "Signed: $(du -sh ManesClient_v2.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ManesClient-v2.0-MC26.20
          path: ManesClient_v2.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-${{ github.run_number }}
          name: "ManesClient v2.0 MC26.20 Build ${{ github.run_number }}"
          files: ManesClient_v2.apk
          token: ${{ secrets.GITHUB_TOKEN }}
