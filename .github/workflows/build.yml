name: Build ManesClient APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger a build manually from your phone browser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Grab your code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install build tools ──────────────────────────────────────────
      - name: Install apktool + zipalign + apksigner
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner openjdk-17-jdk wget unzip

          # Download apktool latest
          APKTOOL_VER=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep tag_name | cut -d '"' -f4)
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/${APKTOOL_VER}/apktool_${APKTOOL_VER#v}.jar" -O apktool.jar
          echo '#!/bin/bash\njava -jar '"$(pwd)/apktool.jar"' "$@"' | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool

      # ── 3. Set up Android NDK ───────────────────────────────────────────
      - name: Set up Android NDK r26
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      # ── 4. Decode the base Minecraft APK ────────────────────────────────
      #    You upload your MC 26.20 base.apk as a GitHub secret (base64 encoded).
      #    See README_SETUP.md for exact steps.
      - name: Decode base Minecraft APK
        run: |
          echo "${{ secrets.MC_APK_BASE64 }}" | base64 -d > base_mc.apk
          echo "✅ MC APK decoded ($(du -sh base_mc.apk | cut -f1))"

      # ── 5. Compile libManesClient.so with NDK ───────────────────────────
      - name: Compile C++ → .so (arm64-v8a)
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd app/src/main/jni
          $NDK/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI="arm64-v8a armeabi-v7a" \
            -j$(nproc)
          echo "✅ Compiled:"
          ls -lh ../../../../libs/arm64-v8a/ ../../../../libs/armeabi-v7a/ 2>/dev/null || true

      # ── 6. Inject .so into the APK ──────────────────────────────────────
      - name: Decode + inject .so into APK
        run: |
          apktool d base_mc.apk -o mc_decoded --no-res -f
          
          # Inject arm64-v8a
          mkdir -p mc_decoded/lib/arm64-v8a
          cp app/src/main/libs/arm64-v8a/libManesClient.so mc_decoded/lib/arm64-v8a/ 2>/dev/null || \
          cp libs/arm64-v8a/libManesClient.so              mc_decoded/lib/arm64-v8a/ 2>/dev/null || true

          # Inject armeabi-v7a (older devices)
          mkdir -p mc_decoded/lib/armeabi-v7a
          cp app/src/main/libs/armeabi-v7a/libManesClient.so mc_decoded/lib/armeabi-v7a/ 2>/dev/null || \
          cp libs/armeabi-v7a/libManesClient.so               mc_decoded/lib/armeabi-v7a/ 2>/dev/null || true

          # Rebuild
          apktool b mc_decoded -o ManesClient_unsigned.apk
          echo "✅ APK rebuilt"

      # ── 7. Align + sign ─────────────────────────────────────────────────
      - name: Align and sign APK
        run: |
          # Generate a debug keystore (change details for release)
          keytool -genkeypair -v \
            -keystore manes.keystore \
            -alias manes \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=ManesClient, OU=Mods, O=ManesClient, L=PH, S=NCR, C=PH" \
            -storepass manespass -keypass manespass 2>/dev/null

          zipalign -v 4 ManesClient_unsigned.apk ManesClient_aligned.apk

          apksigner sign \
            --ks manes.keystore \
            --ks-key-alias manes \
            --ks-pass pass:manespass \
            --key-pass pass:manespass \
            --out ManesClient_v2.apk \
            ManesClient_aligned.apk

          echo "✅ Signed APK:"
          ls -lh ManesClient_v2.apk

      # ── 8. Upload as downloadable artifact ──────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManesClient-v2.0-MC26.20
          path: ManesClient_v2.apk
          retention-days: 30

      # ── 9. Optional: also create a GitHub Release ────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-${{ github.run_number }}
          name: "ManesClient v2.0 — MC 26.20 (Build #${{ github.run_number }})"
          body: |
            🎮 **ManesClient v2.0** for Minecraft Bedrock 26.20
            
            **New in v2.0:**
            - Custom Crosshair (6 styles, rainbow, outline)
            - Velocity (knockback reduction)
            - Anti-AFK
            - Scaffold + Tower
            - Auto Armor
            - Reach Display HUD
            - ESP Health Bars
            - Theme Picker (8 presets + custom + rainbow)
            
            ⚠️ Uninstall original Minecraft first, then install this.
          files: ManesClient_v2.apk
          token: ${{ secrets.GITHUB_TOKEN }}
