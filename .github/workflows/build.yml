name: Build ManesClient APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install apktool + zipalign + apksigner
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner openjdk-17-jdk wget unzip cmake

          APKTOOL_VER=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep tag_name | cut -d '"' -f4)
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/${APKTOOL_VER}/apktool_${APKTOOL_VER#v}.jar" -O apktool.jar
          echo "#!/bin/bash" | sudo tee /usr/local/bin/apktool > /dev/null
          echo "java -jar $(pwd)/apktool.jar \"\$@\"" | sudo tee -a /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Set up Android NDK r26
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Download base Minecraft APK
        run: |
          wget -q "${{ secrets.MC_APK_URL }}" -O base_mc.apk
          echo "Downloaded $(du -sh base_mc.apk | cut -f1)"

      - name: Build Dobby hooking library from source
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p app/src/main/jni/libraries/arm64-v8a
          mkdir -p app/src/main/jni/libraries/armeabi-v7a

          git clone https://github.com/jmpews/Dobby --depth=1
          cd Dobby

          # Build arm64-v8a
          cmake -B build_arm64 \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPlugin.SymbolResolver=OFF \
            -DPlugin.Darwin.HideLibrary=OFF
          cmake --build build_arm64 -j$(nproc)
          cp build_arm64/libdobby.a ../app/src/main/jni/libraries/arm64-v8a/libdobby.a

          # Build armeabi-v7a
          cmake -B build_arm32 \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPlugin.SymbolResolver=OFF \
            -DPlugin.Darwin.HideLibrary=OFF
          cmake --build build_arm32 -j$(nproc)
          cp build_arm32/libdobby.a ../app/src/main/jni/libraries/armeabi-v7a/libdobby.a

          cd ..
          echo "Dobby built successfully:"
          ls -lh app/src/main/jni/libraries/arm64-v8a/
          ls -lh app/src/main/jni/libraries/armeabi-v7a/

      - name: Compile C++ → .so
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd app/src/main/jni
          $NDK/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI="arm64-v8a armeabi-v7a" \
            -j$(nproc)
          echo "Compiled .so files:"
          find ../../../../libs -name "*.so" -exec ls -lh {} \;

      - name: Inject .so into APK
        run: |
          apktool d base_mc.apk -o mc_decoded --no-res -f

          mkdir -p mc_decoded/lib/arm64-v8a
          mkdir -p mc_decoded/lib/armeabi-v7a

          cp libs/arm64-v8a/libManesClient.so  mc_decoded/lib/arm64-v8a/  2>/dev/null || \
          cp app/src/main/libs/arm64-v8a/libManesClient.so mc_decoded/lib/arm64-v8a/ 2>/dev/null || true

          cp libs/armeabi-v7a/libManesClient.so mc_decoded/lib/armeabi-v7a/ 2>/dev/null || \
          cp app/src/main/libs/armeabi-v7a/libManesClient.so mc_decoded/lib/armeabi-v7a/ 2>/dev/null || true

          apktool b mc_decoded -o ManesClient_unsigned.apk
          echo "APK rebuilt: $(du -sh ManesClient_unsigned.apk | cut -f1)"

      - name: Align and sign APK
        run: |
          keytool -genkeypair -v \
            -keystore manes.keystore \
            -alias manes \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=ManesClient, OU=Mods, O=ManesClient, L=PH, S=NCR, C=PH" \
            -storepass manespass -keypass manespass 2>/dev/null

          zipalign -v 4 ManesClient_unsigned.apk ManesClient_aligned.apk

          apksigner sign \
            --ks manes.keystore \
            --ks-key-alias manes \
            --ks-pass pass:manespass \
            --key-pass pass:manespass \
            --out ManesClient_v2.apk \
            ManesClient_aligned.apk

          echo "Final APK: $(du -sh ManesClient_v2.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManesClient-v2.0-MC26.20
          path: ManesClient_v2.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-${{ github.run_number }}
          name: "ManesClient v2.0 — MC 26.20 (Build #${{ github.run_number }})"
          body: |
            ManesClient v2.0 for Minecraft Bedrock 26.20
            - Custom Crosshair, Velocity, Anti-AFK, Scaffold, Tower
            - Auto Armor, Reach HUD, ESP Health Bars, Theme Picker
          files: ManesClient_v2.apk
          token: ${{ secrets.GITHUB_TOKEN }}
